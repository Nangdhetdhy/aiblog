<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — AI Blog Generator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f9f8f6; --card: #fff; --border: #e8e6df;
  --text: #1a1a18; --muted: #6b6b65; --accent: #5b4fcf;
  --accent-bg: #eeecfd; --green: #1d9e75; --green-bg: #e1f5ee;
  --red: #e24b4a; --red-bg: #fcebeb;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

nav { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 12px; height: 56px; }
.logo { width: 30px; height: 30px; background: var(--accent); border-radius: 8px; display: grid; place-items: center; }
.logo svg { width: 16px; height: 16px; fill: white; }
nav h1 { font-size: 17px; font-weight: 700; }
.nav-badge { margin-left: auto; font-size: 12px; background: var(--green-bg); color: var(--green); padding: 3px 10px; border-radius: 20px; font-weight: 500; }
.back-link { font-size: 13px; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 4px; }
.back-link:hover { color: var(--accent); }

.layout { display: grid; grid-template-columns: 360px 1fr; gap: 0; height: calc(100vh - 56px); }
.sidebar { background: var(--card); border-right: 1px solid var(--border); padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; }
.main { overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }

.form-label { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 8px; }
input, select, textarea {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px;
  font-size: 14px; background: var(--bg); color: var(--text); font-family: inherit; outline: none;
  transition: border .15s;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); background: var(--card); }
textarea { resize: vertical; min-height: 70px; }

.topic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.topic-btn { padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); cursor: pointer; font-size: 13px; text-align: left; transition: all .15s; color: var(--text); }
.topic-btn:hover { border-color: var(--accent); background: var(--accent-bg); }
.topic-btn.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); font-weight: 600; }

.btn-gen { width: 100%; padding: 13px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity .2s; }
.btn-gen:hover { opacity: .9; }
.btn-gen:disabled { opacity: .5; cursor: not-allowed; }

.schedule-card { background: var(--accent-bg); border: 1px solid #c9c4f5; border-radius: 10px; padding: 14px; font-size: 13px; color: #3c3489; }
.schedule-card strong { display: block; font-size: 14px; margin-bottom: 4px; color: #26215c; }

.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; color: var(--muted); text-align: center; }
.empty-state svg { opacity: .2; }
.empty-state h3 { font-size: 18px; font-weight: 600; color: var(--text); }

.article-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.ab-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.ab-badges { display: flex; gap: 8px; flex-wrap: wrap; }
.badge { font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
.b-topic { background: var(--accent-bg); color: var(--accent); }
.b-status { background: var(--green-bg); color: var(--green); }
.ab-actions { display: flex; gap: 8px; }
.btn-sm { padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--bg); color: var(--text); transition: all .15s; }
.btn-sm:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.btn-publish { background: var(--green); color: white; border-color: var(--green); }
.btn-publish:hover { background: #0f6e56; color: white; border-color: #0f6e56; }
.btn-delete { background: var(--red-bg); color: var(--red); border-color: #f09595; }
.btn-delete:hover { background: var(--red); color: white; }

.ab-body { padding: 20px; }
.art-title { font-size: 22px; font-weight: 800; line-height: 1.35; margin-bottom: 10px; }
.art-meta { display: flex; gap: 14px; font-size: 13px; color: var(--muted); margin-bottom: 16px; }
.art-content { font-size: 15px; line-height: 1.85; }
.art-content h2 { font-size: 18px; font-weight: 700; margin: 20px 0 8px; }
.art-content h3 { font-size: 16px; font-weight: 600; margin: 16px 0 6px; }
.art-content p  { margin-bottom: 12px; }
.art-content ul, .art-content ol { margin: 8px 0 12px 20px; }
.art-content li { margin-bottom: 5px; }
.art-content strong { font-weight: 600; }
.seo-box { margin-top: 16px; padding: 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; }
.seo-box h4 { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 10px; }
.seo-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 13px; }
.seo-l { font-weight: 600; min-width: 100px; color: var(--muted); flex-shrink: 0; }
.kws { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
.kw { background: var(--accent-bg); color: var(--accent); padding: 2px 8px; border-radius: 4px; font-size: 11px; }

.loading-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 40px; text-align: center; color: var(--muted); }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

.history-item { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: background .15s; }
.history-item:hover { background: var(--bg); }
.hdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.htitle { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
.hdate { font-size: 11px; color: var(--muted); }

@media (max-width: 768px) { .layout { grid-template-columns: 1fr; } .sidebar { height: auto; } }
</style>
</head>
<body>

<nav>
  <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
  <h1>Admin Panel</h1>
  <a href="/" class="back-link" style="margin-left:12px">← Lihat Blog</a>
  <span class="nav-badge">● Terhubung ke Supabase</span>
</nav>

<div class="layout">
  <div class="sidebar">

    <div>
      <label class="form-label">Topik Artikel</label>
      <div class="topic-grid" id="topic-grid">
        <button class="topic-btn active" onclick="selectTopic(this,'Teknologi & AI')">🤖 Teknologi & AI</button>
        <button class="topic-btn" onclick="selectTopic(this,'Bisnis Online')">💼 Bisnis Online</button>
        <button class="topic-btn" onclick="selectTopic(this,'Kesehatan')">💪 Kesehatan</button>
        <button class="topic-btn" onclick="selectTopic(this,'Gaya Hidup')">🌿 Gaya Hidup</button>
        <button class="topic-btn" onclick="selectTopic(this,'Keuangan')">💰 Keuangan</button>
        <button class="topic-btn" onclick="selectTopic(this,'Pendidikan')">📚 Pendidikan</button>
      </div>
      <input type="text" id="custom-topic" placeholder="Atau ketik topik sendiri..." style="margin-top:8px">
    </div>

    <div>
      <label class="form-label">Gaya Penulisan</label>
      <select id="tone">
        <option value="informatif dan mudah dipahami">Informatif & Mudah Dipahami</option>
        <option value="profesional dan akademis">Profesional & Akademis</option>
        <option value="santai dan conversational">Santai & Conversational</option>
        <option value="inspiratif dan motivatif">Inspiratif & Motivatif</option>
      </select>
    </div>

    <div>
      <label class="form-label">Panjang Artikel</label>
      <select id="length">
        <option value="pendek sekitar 400 kata">Pendek (~400 kata)</option>
        <option value="sedang sekitar 700 kata" selected>Sedang (~700 kata)</option>
        <option value="panjang sekitar 1000 kata">Panjang (~1000 kata)</option>
      </select>
    </div>

    <button class="btn-gen" id="gen-btn" onclick="generateArticle()">
      ✨ Generate Artikel Sekarang
    </button>

    <div class="schedule-card">
      <strong>⏰ Jadwal Otomatis</strong>
      Artikel baru di-generate & dipublish otomatis setiap hari pukul <b>07.00 WIB</b> tanpa perlu buka halaman ini.
    </div>

    <div id="history-section" style="display:none">
      <label class="form-label">Artikel Terbaru</label>
      <div id="history-list"></div>
    </div>

  </div>

  <div class="main" id="main">
    <div class="empty-state" id="empty">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <h3>Siap Generate Artikel!</h3>
      <p>Pilih topik di sebelah kiri dan klik Generate.</p>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ccaewziceuspfwutppeo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjYWV3emljZXVzcGZ3dXRwcGVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTkxMzgsImV4cCI6MjA4OTc3NTEzOH0.5dYo_gK5PmLqrUBICExIbwBErq_4b7dnxdEKzCC8hfM';

let selectedTopic = 'Teknologi & AI';
let articles = [];

function selectTopic(btn, topic) {
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedTopic = topic;
  document.getElementById('custom-topic').value = '';
}

function getTopic() {
  return document.getElementById('custom-topic').value.trim() || selectedTopic;
}

async function generateArticle() {
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Sedang menulis artikel...';
  document.getElementById('empty').style.display = 'none';

  const topic   = getTopic();
  const tone    = document.getElementById('tone').value;
  const length  = document.getElementById('length').value;

  const lid = 'load-' + Date.now();
  const loadEl = document.createElement('div');
  loadEl.id = lid;
  loadEl.className = 'loading-card';
  loadEl.innerHTML = `<div class="spinner"></div><p style="font-weight:600;color:var(--text)">Menulis artikel "${topic}"...</p><p style="font-size:13px;margin-top:6px">Claude AI sedang bekerja, harap tunggu 10-20 detik</p>`;
  document.getElementById('main').prepend(loadEl);

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic, tone, length })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Generate gagal');

    document.getElementById(lid).remove();
    const article = await fetchArticle(data.id);
    if (article) renderArticle(article, true);
    loadHistory();

  } catch (err) {
    document.getElementById(lid).innerHTML =
      `<p style="color:var(--red);font-weight:600">Gagal generate artikel</p><p style="font-size:13px;margin-top:6px">${err.message}</p>`;
  }

  btn.disabled = false;
  btn.textContent = '✨ Generate Artikel Sekarang';
}

async function fetchArticle(id) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/articles?id=eq.${id}`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  const data = await res.json();
  return data[0];
}

async function loadHistory() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/articles?order=created_at.desc&limit=8`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  articles = await res.json();
  document.getElementById('history-section').style.display = articles.length ? 'block' : 'none';
  document.getElementById('history-list').innerHTML = articles.map(a =>
    `<div class="history-item" onclick="showArticle('${a.id}')">
      <div class="hdot" style="background:${a.status==='published'?'var(--green)':'var(--muted)'}"></div>
      <span class="htitle">${a.title}</span>
      <span class="hdate">${new Date(a.created_at).toLocaleDateString('id-ID',{day:'numeric',month:'short'})}</span>
    </div>`
  ).join('');
}

function showArticle(id) {
  const a = articles.find(x => x.id === id);
  if (a) renderArticle(a, false);
}

function renderArticle(a, prepend) {
  const el = document.createElement('div');
  el.id = 'art-' + a.id;
  el.className = 'article-box';
  const date = new Date(a.created_at).toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
  const kwHtml = a.keywords?.length ? `<div class="seo-box"><h4>🔍 Info SEO</h4>
    ${a.meta_title ? `<div class="seo-row"><span class="seo-l">Meta Title</span><span>${a.meta_title}</span></div>` : ''}
    ${a.meta_desc  ? `<div class="seo-row"><span class="seo-l">Meta Desc</span><span>${a.meta_desc}</span></div>` : ''}
    <div class="seo-row"><span class="seo-l">Keywords</span><div class="kws">${a.keywords.map(k=>`<span class="kw">${k}</span>`).join('')}</div></div>
  </div>` : '';

  el.innerHTML = `
    <div class="ab-header">
      <div class="ab-badges">
        <span class="badge b-topic">${a.topic || 'Umum'}</span>
        <span class="badge b-status" id="st-${a.id}">● ${a.status === 'published' ? 'Published' : 'Draft'}</span>
      </div>
      <div class="ab-actions">
        <button class="btn-sm" onclick="copyArticle('${a.id}')">📋 Copy</button>
        ${a.status !== 'published'
          ? `<button class="btn-sm btn-publish" onclick="publishArticle('${a.id}')">🚀 Publish</button>`
          : `<button class="btn-sm" disabled style="opacity:.4">✅ Published</button>`}
        <button class="btn-sm btn-delete" onclick="deleteArticle('${a.id}')">🗑</button>
      </div>
    </div>
    <div class="ab-body">
      <h1 class="art-title">${a.title}</h1>
      <div class="art-meta"><span>📅 ${date}</span><span>✍️ Claude AI</span><span>📖 ~5 mnt baca</span></div>
      <div class="art-content">${markdownToHtml(a.content)}</div>
      ${kwHtml}
    </div>`;

  const main = document.getElementById('main');
  if (prepend) main.prepend(el);
  else { main.innerHTML = ''; main.appendChild(el); }
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function publishArticle(id) {
  await fetch(`${SUPABASE_URL}/rest/v1/articles?id=eq.${id}`, {
    method: 'PATCH',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ status: 'published', published_at: new Date().toISOString() })
  });
  const badge = document.getElementById('st-' + id);
  if (badge) badge.textContent = '✅ Published';
  const btn = document.querySelector(`#art-${id} .btn-publish`);
  if (btn) { btn.disabled = true; btn.textContent = '✅ Published'; btn.classList.remove('btn-publish'); }
  showToast('Artikel berhasil dipublish! 🎉');
  loadHistory();
}

async function deleteArticle(id) {
  if (!confirm('Hapus artikel ini?')) return;
  await fetch(`${SUPABASE_URL}/rest/v1/articles?id=eq.${id}`, {
    method: 'DELETE',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  document.getElementById('art-' + id)?.remove();
  loadHistory();
  showToast('Artikel dihapus');
}

function copyArticle(id) {
  const el = document.getElementById('art-' + id);
  const title = el.querySelector('.art-title').textContent;
  const content = el.querySelector('.art-content').innerText;
  navigator.clipboard.writeText(title + '\n\n' + content);
  showToast('Konten disalin! 📋');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1a1a18;color:white;padding:12px 20px;border-radius:10px;font-size:14px;z-index:999';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function markdownToHtml(md) {
  return md
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]+?<\/li>)/g,'<ul>$1</ul>')
    .split('\n\n').map(p => p.startsWith('<') ? p : `<p>${p}</p>`).join('');
}

loadHistory();
</script>
</body>
</html>

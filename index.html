<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Blog — Artikel Harian Otomatis</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f9f8f6;--card:#fff;--border:#e8e6df;--text:#1a1a18;--muted:#6b6b65;--accent:#5b4fcf;--abg:#eeecfd;--green:#1d9e75;--gbg:#e1f5ee}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:12px;height:56px;position:sticky;top:0;z-index:100}
.nlogo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700;text-decoration:none;color:var(--text)}
.licon{width:30px;height:30px;background:var(--accent);border-radius:8px;display:grid;place-items:center}
.licon svg{width:16px;height:16px;fill:white}
.nlinks{display:flex;gap:4px;margin-left:auto}
.nlink{padding:6px 14px;border-radius:8px;font-size:14px;font-weight:500;text-decoration:none;color:var(--muted);transition:all .15s}
.nlink:hover,.nlink.on{background:var(--abg);color:var(--accent)}
.hero{background:var(--card);border-bottom:1px solid var(--border);padding:48px 24px;text-align:center}
.hero h1{font-size:clamp(26px,5vw,42px);font-weight:800;letter-spacing:-.5px;margin-bottom:12px}
.hero h1 span{color:var(--accent)}
.hero p{font-size:16px;color:var(--muted);max-width:480px;margin:0 auto 20px;line-height:1.6}
.hbadge{display:inline-flex;align-items:center;gap:6px;background:var(--gbg);color:var(--green);font-size:13px;font-weight:500;padding:5px 14px;border-radius:20px}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.2)}}
.container{max-width:1100px;margin:0 auto;padding:36px 24px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.sec-head h2{font-size:20px;font-weight:700}
.cbadge{font-size:13px;color:var(--muted);background:var(--bg);border:1px solid var(--border);padding:3px 10px;border-radius:20px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.fbtn{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .15s}
.fbtn:hover,.fbtn.on{border-color:var(--accent);background:var(--abg);color:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.acard{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;display:flex;flex-direction:column}
.acard:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.07)}
.ct{padding:18px 18px 0}
.ctopic{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--abg);color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.ctitle{font-size:16px;font-weight:700;line-height:1.4;margin-bottom:8px}
.cexcerpt{font-size:13px;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.cb{padding:12px 18px;margin-top:auto;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cdate{font-size:12px;color:var(--muted)}
.cread{font-size:12px;font-weight:500;color:var(--accent)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px}
.overlay.open{display:flex}
.modal{background:var(--card);border-radius:16px;max-width:740px;width:100%;margin:auto}
.mh{padding:24px 28px 0}
.mclose{float:right;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;color:var(--muted)}
.mclose:hover{background:var(--border)}
.mtopic{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:block}
.mtitle{font-size:clamp(20px,4vw,26px);font-weight:800;line-height:1.3;margin-bottom:10px}
.mmeta{display:flex;gap:14px;font-size:13px;color:var(--muted);padding-bottom:18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.mb{padding:22px 28px 28px}
.mc{font-size:16px;line-height:1.85}
.mc h2{font-size:19px;font-weight:700;margin:22px 0 10px}
.mc p{margin-bottom:13px}
.mc ul{margin:8px 0 13px 22px}
.mc li{margin-bottom:5px}
.mc strong{font-weight:600}
.seobox{margin-top:22px;padding:14px;background:var(--bg);border-radius:10px;border:1px solid var(--border)}
.seobox h4{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:10px}
.kwlist{display:flex;flex-wrap:wrap;gap:5px}
.kw{background:var(--abg);color:var(--accent);font-size:12px;padding:2px 8px;border-radius:4px}
.sbox{text-align:center;padding:60px 20px;color:var(--muted)}
.sbox h3{font-size:18px;font-weight:600;color:var(--text);margin:12px 0 6px}
.spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.fab{position:fixed;bottom:28px;right:28px;background:var(--accent);color:white;border:none;border-radius:50px;padding:13px 22px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(91,79,207,.4);transition:all .2s;text-decoration:none;display:flex;align-items:center;gap:8px}
.fab:hover{transform:translateY(-2px)}
@media(max-width:600px){.grid{grid-template-columns:1fr}.overlay{padding:0;align-items:flex-end}.modal{border-radius:16px 16px 0 0}.mh,.mb{padding:18px}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nlogo">
    <div class="licon"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    AI Blog
  </a>
  <div class="nlinks">
    <a href="/" class="nlink on">Beranda</a>
    <a href="/admin.html" class="nlink">Admin</a>
  </div>
</nav>
<div class="hero">
  <h1>Blog Pintar <span>Bertenaga AI</span></h1>
  <p>Artikel berkualitas tinggi di-generate otomatis setiap hari oleh Claude AI.</p>
  <div class="hbadge"><div class="pulse"></div> Update otomatis setiap hari 07.00 WIB</div>
</div>
<div class="container">
  <div class="filters" id="filters"><button class="fbtn on" onclick="filterTopic(this,'')">Semua</button></div>
  <div class="sec-head"><h2>Artikel Terbaru</h2><span class="cbadge" id="cbadge">Memuat...</span></div>
  <div id="articles"><div class="sbox"><div class="spin"></div><p>Memuat artikel...</p></div></div>
</div>
<div class="overlay" id="overlay" onclick="if(event.target===this)closeOv()">
  <div class="modal">
    <div class="mh">
      <button class="mclose" onclick="closeOv()">✕ Tutup</button>
      <span class="mtopic" id="m-topic"></span>
      <h1 class="mtitle" id="m-title"></h1>
      <div class="mmeta"><span id="m-date"></span><span>✍️ Claude AI</span><span>📖 ~5 menit baca</span></div>
    </div>
    <div class="mb">
      <div class="mc" id="m-content"></div>
      <div class="seobox" id="m-seo" style="display:none"><h4>🔍 Kata Kunci SEO</h4><div class="kwlist" id="m-kw"></div></div>
    </div>
  </div>
</div>
<a href="/admin.html" class="fab">✨ Generate Artikel</a>
<script>
const SB='https://ccaewziceuspfwutppeo.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjYWV3emljZXVzcGZ3dXRwcGVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTkxMzgsImV4cCI6MjA4OTc3NTEzOH0.5dYo_gK5PmLqrUBICExIbwBErq_4b7dnxdEKzCC8hfM';
let all=[],cur='';
async function load(){
  try{
    const r=await fetch(`${SB}/rest/v1/articles?status=eq.published&order=published_at.desc`,{headers:{apikey:SK,Authorization:`Bearer ${SK}`}});
    all=await r.json();buildFilters();render();
  }catch(e){document.getElementById('articles').innerHTML=`<div class="sbox"><h3>Gagal memuat</h3><p>${e.message}</p></div>`;}
}
function buildFilters(){
  const topics=[...new Set(all.map(a=>a.topic).filter(Boolean))];
  const f=document.getElementById('filters');
  topics.forEach(t=>{const b=document.createElement('button');b.className='fbtn';b.textContent=t;b.onclick=()=>filterTopic(b,t);f.appendChild(b);});
}
function filterTopic(btn,t){cur=t;document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('on',b===btn));render();}
function render(){
  const list=cur?all.filter(a=>a.topic===cur):all;
  document.getElementById('cbadge').textContent=`${list.length} artikel`;
  if(!list.length){document.getElementById('articles').innerHTML='<div class="sbox"><h3>Belum ada artikel</h3><p>Klik Generate untuk membuat konten pertama.</p></div>';return;}
  document.getElementById('articles').innerHTML=`<div class="grid">${list.map(card).join('')}</div>`;
}
function card(a){
  const ex=a.content.replace(/#{1,3}\s+/g,'').replace(/\*\*/g,'').slice(0,150)+'...';
  const d=new Date(a.published_at||a.created_at).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
  return `<div class="acard" onclick="openArt('${a.id}')"><div class="ct"><span class="ctopic">${a.topic||'Umum'}</span><div class="ctitle">${a.title}</div><div class="cexcerpt">${ex}</div></div><div class="cb"><span class="cdate">📅 ${d}</span><span class="cread">Baca →</span></div></div>`;
}
function openArt(id){
  const a=all.find(x=>x.id===id);if(!a)return;
  document.getElementById('m-topic').textContent=a.topic||'Umum';
  document.getElementById('m-title').textContent=a.title;
  document.getElementById('m-date').textContent='📅 '+new Date(a.published_at||a.created_at).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('m-content').innerHTML=md2html(a.content);
  if(a.keywords?.length){document.getElementById('m-seo').style.display='block';document.getElementById('m-kw').innerHTML=a.keywords.map(k=>`<span class="kw">${k}</span>`).join('');}
  else document.getElementById('m-seo').style.display='none';
  document.getElementById('overlay').classList.add('open');document.body.style.overflow='hidden';
}
function closeOv(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
function md2html(md){
  return md.replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^- (.+)$/gm,'<li>$1</li>').replace(/(<li>[\s\S]+?<\/li>)/g,'<ul>$1</ul>')
    .split('\n\n').map(p=>p.startsWith('<')?p:`<p>${p}</p>`).join('');
}
load();
</script>
</body>
</html>
